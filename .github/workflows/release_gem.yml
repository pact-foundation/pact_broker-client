name: Release gem

on:
  repository_dispatch:
    types:
      - release-triggered
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9  # v1.316.0
      with:
        bundler-cache: true
    - name: Test
      run: bundle exec rake

  release:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      gem_name: ${{ steps.release.outputs.gem_name }}
      version: ${{ steps.release.outputs.version }}
      increment: ${{ steps.release.outputs.increment }}
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0
    - uses: pact-foundation/release-gem@b1b4ab9ad10605e41a34f13f1c2baae78d73bfa7  # v1
      id: release
      env:
        GEM_HOST_API_KEY: '${{ secrets.RUBYGEMS_API_KEY }}'
        GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
        INCREMENT: '${{ github.event.client_payload.increment }}'

  record-release:
    needs: release
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
    - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9  # v1.316.0
      with:
        bundler-cache: true
    - name: Record release
      run: script/ci/record-release.sh
      env:
        PACT_BROKER_BASE_URL: https://pact-foundation.pactflow.io
        PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN_PACT_FOUNDATION }}

  notify-gem-released:
    needs: release
    strategy:
      matrix:
        repository: [pact-foundation/pact-docker-cli, pact-foundation/pact-standalone, pact-foundation/pact_broker-client]
    runs-on: ubuntu-latest
    steps:
      - name: Notify ${{ matrix.repository }} of gem release
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ secrets.GHTOKENFORPACTCLIRELEASE }}
          repository: ${{ matrix.repository }}
          event-type: gem-released
          client-payload: |
              {
                "name": "${{ needs.release.outputs.gem_name }}",
                "version": "${{ needs.release.outputs.version }}",
                "increment": "${{ needs.release.outputs.increment }}"
              }
